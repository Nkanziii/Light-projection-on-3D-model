<!DOCTYPE html>
<html lang="en">
<head>
  <title>Religious Oppression — Light & Shadow</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
 
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
 
<script type="module">
 
  import * as THREE from 'three';
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
 
  let renderer, scene, camera, spotLight;
 
  // ── Quranic verses  ──────────────────────────────────────────────
  
  const VERSES = [
    { arabic: "وَعَاشِرُوهُنَّ بِالْمَعْرُوفِ",                                  translation: "And live with them in kindness — 4:19" },
    { arabic: "وَلَهُنَّ مِثْلُ الَّذِي عَلَيْهِنَّ بِالْمَعْرُوفِ",                       translation: "And women have rights similar to what they owe, in a fair manner. — 2:228" },
    { arabic: "يَا أَيُّهَا النَّاسُ اتَّقُوا رَبَّكُمُ الَّذِي خَلَقَكُم مِّن نَّفْسٍ وَاحِدَةٍ",   translation: "O people, fear your Lord who created you from a single soul — 4:1" },
  ];
 
  let currentVerseIndex = 0;
  let verseTexture = null;
 
  // ── Build spotlight gobo texture from Arabic text ─────────────────────────
  function buildVerseTexture(verse) {
    const SIZE = 512;
    const canvas = document.createElement('canvas');
    canvas.width = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
 
    // Black background = blocks light; white text = lets light through (gobo logic)
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, SIZE, SIZE);
 
    // Outer vignette — keeps beam feeling tight and dramatic
    const vignette = ctx.createRadialGradient(SIZE/2, SIZE/2, SIZE*0.1, SIZE/2, SIZE/2, SIZE*0.55);
    vignette.addColorStop(0, 'rgba(255,255,255,1)');
    vignette.addColorStop(0.6, 'rgba(255,255,255,0.85)');
    vignette.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vignette;
    ctx.beginPath();
    ctx.arc(SIZE/2, SIZE/2, SIZE/2, 0, Math.PI * 2);
    ctx.fill();
 
    // Mask everything outside circle back to black
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    ctx.arc(SIZE/2, SIZE/2, SIZE/2 - 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
 
    // Cut the Arabic text OUT of the light (gobo effect — text appears dark in beam)
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.direction = 'rtl';
 
    // Arabic verse — large, centered
    ctx.font = `bold ${Math.floor(SIZE * 0.09)}px serif`;
    wrapText(ctx, verse.arabic, SIZE/2, SIZE/2 - SIZE*0.06, SIZE * 0.82, SIZE * 0.12);
 
    // Translation — smaller, below
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(180,180,180,0.5)';
    ctx.direction = 'ltr';
    ctx.font = `italic ${Math.floor(SIZE * 0.038)}px serif`;
    ctx.fillText(verse.translation, SIZE/2, SIZE/2 + SIZE*0.18);
 
    ctx.globalCompositeOperation = 'source-over';
 
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    return tex;
  }
 
  // Simple word-wrap for canvas
  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    // For Arabic, we split by spaces
    const words = text.split(' ');
    let line = '';
    const lines = [];
 
    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && i > 0) {
        lines.push(line.trim());
        line = words[i] + ' ';
      } else {
        line = testLine;
      }
    }
    lines.push(line.trim());
 
    const totalH = lines.length * lineHeight;
    const startY = y - totalH / 2 + lineHeight / 2;
    lines.forEach((l, i) => {
      ctx.fillText(l, x, startY + i * lineHeight);
    });
  }
 
  // ── INIT ──────────────────────────────────────────────────────────────────
  init();
 
  function init() {
 
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setAnimationLoop(animate);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.NeutralToneMapping;
    renderer.toneMappingExposure = 1;
    document.body.appendChild(renderer.domElement);
 
    scene = new THREE.Scene();
 
    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(7, 4, 1);
 
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.minDistance = 2;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI / 2;
    controls.target.set(0, 1, 0);
    controls.update();
 
    // Very dark ambient — keep it harsh
    const ambient = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 0.05);
    scene.add(ambient);
 
    // ── Spotlight with verse gobo ──────────────────────────────────────────
    spotLight = new THREE.SpotLight(0xfff5e0, 400); // warm white, like a stage light
    spotLight.position.set(2.5, 5, 2.5);
    spotLight.angle = Math.PI / 6;
    spotLight.penumbra = 0.15;   // hard edge for drama
    spotLight.decay = 2;
    spotLight.distance = 0;
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 2048;
    spotLight.shadow.mapSize.height = 2048;
    spotLight.shadow.camera.near = 1;
    spotLight.shadow.camera.far = 20;
    spotLight.shadow.focus = 1;
    spotLight.shadow.bias = -0.003;
    spotLight.shadow.intensity = 1;
 
    // Build first verse texture and assign as gobo
    verseTexture = buildVerseTexture(VERSES[currentVerseIndex]);
    spotLight.map = verseTexture;
 
    scene.add(spotLight);
 
    // Helpers (hidden by default)
    spotLight.lightHelper = new THREE.SpotLightHelper(spotLight);
    spotLight.lightHelper.visible = false;
    scene.add(spotLight.lightHelper);
 
    spotLight.shadowCameraHelper = new THREE.CameraHelper(spotLight.shadow.camera);
    spotLight.shadowCameraHelper.visible = false;
    scene.add(spotLight.shadowCameraHelper);
 
    // Floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshLambertMaterial({ color: 0x111111 })
    );
    floor.position.set(0, -1, 0);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);
 
    // Load model
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('./statue.glb', function(gltf) {
 
      const model = gltf.scene;
 
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 3 / maxDim;
      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));
      model.position.y += 0.5;
 
      model.traverse(function(child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
 
      scene.add(model);
 
    }, undefined, function(error) {
      console.error('Error loading model:', error);
    });
 
    window.addEventListener('resize', onWindowResize);
 
    // ── Cycle verses every 4 seconds ──────────────────────────────────────
    setInterval(() => {
      currentVerseIndex = (currentVerseIndex + 1) % VERSES.length;
      if (verseTexture) verseTexture.dispose();
      verseTexture = buildVerseTexture(VERSES[currentVerseIndex]);
      spotLight.map = verseTexture;
    }, 4000);
 
    // ── GUI ───────────────────────────────────────────────────────────────
    const gui = new GUI();
    const params = {
      intensity:       spotLight.intensity,
      distance:        spotLight.distance,
      angle:           spotLight.angle,
      penumbra:        spotLight.penumbra,
      decay:           spotLight.decay,
      focus:           spotLight.shadow.focus,
      shadowIntensity: spotLight.shadow.intensity,
      helpers:         false,
      verseCycleSpeed: 4,
    };
 
    gui.add(params, 'intensity', 0, 600).onChange(val => spotLight.intensity = val);
    gui.add(params, 'distance', 0, 20).onChange(val => spotLight.distance = val);
    gui.add(params, 'angle', 0, Math.PI / 3).onChange(val => spotLight.angle = val);
    gui.add(params, 'penumbra', 0, 1).onChange(val => spotLight.penumbra = val);
    gui.add(params, 'decay', 1, 2).onChange(val => spotLight.decay = val);
    gui.add(params, 'focus', 0, 1).onChange(val => spotLight.shadow.focus = val);
    gui.add(params, 'shadowIntensity', 0, 1).onChange(val => spotLight.shadow.intensity = val);
    gui.add(params, 'helpers').onChange(val => {
      spotLight.lightHelper.visible = val;
      spotLight.shadowCameraHelper.visible = val;
    });
    gui.open();
  }
 
  function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
 
  function animate() {
    const time = performance.now() / 3000;
    spotLight.position.x = Math.cos(time) * 2.5;
    spotLight.position.z = Math.sin(time) * 2.5;
    spotLight.lightHelper.update();
    renderer.render(scene, camera);
  }
 
</script>
</body>
</html>
